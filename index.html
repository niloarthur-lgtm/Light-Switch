<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Switch</title>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="switchContainer notranslate" translate="no" role="switch">
        <input type="checkbox" role="switch" class="toggleElement" id="toggle1">
        <label for="toggle1" class="switchLabel">
                <span aria-hidden="true">On</span><span aria-hidden="true">Off</span>
                <!-- aria-hidden="true" added to screen reading -->
        </label>
    </div>
    <audio src="sounds/ClickSwitch.wav" id="sound1"></audio>
</body>

</html>
